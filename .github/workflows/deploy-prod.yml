  deploy:
    needs: lint
    # needs: test
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. AWS 자격 증명 설정
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Commit ID 가져오기
      - name: Get commit ID
        id: get_commit
        run: echo "COMMIT_ID=${GITHUB_SHA}" >> $GITHUB_ENV

      # 4. AWS SSM에서 파라미터 가져오기
      - name: Fetch environment variables from SSM Parameter Store
        id: fetch-params
        run: |
          # get all parameters
          PARAMETERS=$(aws ssm get-parameters-by-path \
            --path "/LAMBDA/" \
            --recursive \
            --with-decryption \
            --query "Parameters[*]" \
            --output json)

          # save parameters to json file
          echo "$PARAMETERS" > parameters.json

          # set environment variables
          cat parameters.json | jq -c '.[]' | while read PARAMETER; do
            PARAM_NAME=$(echo $PARAMETER | jq -r '.Name')
            PARAM_VALUE=$(echo $PARAMETER | jq -r '.Value')

            # extract lambda name and environment key
            LAMBDA_NAME=$(echo $PARAM_NAME | awk -F'/' '{print $3}')
            ENV_KEY=$(echo $PARAM_NAME | awk -F'/' '{print $5}')

            # Save environment variable configuration (can be saved as file or variable)
            if [ ! -f "$LAMBDA_NAME-env.json" ]; then
              echo '{"Variables":{}}' > "$LAMBDA_NAME-env.json"
            fi

            jq --arg key "$ENV_KEY" --arg value "$PARAM_VALUE" \
              '.Variables[$key] = $value' "$LAMBDA_NAME-env.json" > tmp.json && mv tmp.json "$LAMBDA_NAME-env.json"
          done

      # 5. Lambda 배포
      - name: Deploy each Lambda
        run: |
          # Read the file line by line into an array
          mapfile -t lines < <(cat non-alias.txt | tr -d '\r' | sed 's/^[ \t]*//;s/[ \t]*$//')

          # Convert to JSON
          LINES_JSON=$(printf '%s\n' "${lines[@]}" | jq -R . | jq -s .)
          echo "NON_ALIAS : $LINES_JSON"

          # Apply and deploy environment variables to each Lambda
          for dir in src/*/; do
            PATH_STRIP=${dir%/}
            LAMBDA_NAME=${PATH_STRIP##*/}
            echo " "
            echo "[$LAMBDA_NAME]"

            # Create a fixed zip file
            find . -exec touch -t 200001010000 {} \;
            cd ./src/$LAMBDA_NAME
            find . -type f | sort | zip -r -X -0 ../../$LAMBDA_NAME.zip -@ > /dev/null 2>&1 && echo "$LAMBDA_NAME.zip created successfully!" || echo "Failed to create $LAMBDA_NAME.zip."
            cd ../..

            # Clear cli cache
            # aws configure set cli_cache_enabled false >/dev/null 2>&1 || echo "set cli_cache_enabled Error: $?"

            # Get current alias code hash
            # Check if Lambda exists in non-alias array
            if echo "$LINES_JSON" | jq -e ".[] | select(. == \"$LAMBDA_NAME\")" > /dev/null; then
              echo "$LAMBDA_NAME : non-alias"
              CURRENT_CODE_HASH=$(aws lambda get-function \
                --function-name $LAMBDA_NAME \
                --query 'Configuration.CodeSha256' \
                --output text)
            else
              CURRENT_CODE_HASH=$(aws lambda get-alias \
                --function-name $LAMBDA_NAME \
                --name prod \
                --query 'FunctionVersion' \
                --output text | \
                xargs -I {} aws lambda get-function \
                  --function-name $LAMBDA_NAME \
                  --qualifier {} \
                  --query 'Configuration.CodeSha256' \
                  --output text)
            fi

            # Calculate new code hash
            NEW_CODE_HASH=$(shasum -a 256 $LAMBDA_NAME.zip | awk '{print $1}' | xxd -r -p | base64)

            echo "Current Code Hash: $CURRENT_CODE_HASH"
            echo "New Code Hash: $NEW_CODE_HASH"

            # Compare hashes and deploy if different
            if [ "$CURRENT_CODE_HASH" == "$NEW_CODE_HASH" ]; then
              echo "The code is identical to the current alias deployment. Skipping update."
            else
              echo "The code has changed. Proceeding with deployment."

              # Check if Lambda exists in non-alias array
              if echo "$LINES_JSON" | jq -e ".[] | select(. == \"$LAMBDA_NAME\")" > /dev/null; then
                # Update Lambda function code
                aws lambda update-function-code \
                  --function-name $LAMBDA_NAME \
                  --zip-file fileb://$LAMBDA_NAME.zip \
                  > /dev/null
                echo "Update function code"
              else
                # Get the list of Lambda versions and find version by this commit
                LAMBDA_VERSION=$(aws lambda list-versions-by-function \
                  --function-name $LAMBDA_NAME \
                  --query "Versions[?Description=='${COMMIT_ID}'].Version" \
                  --output text)
                echo "Versions found: $LAMBDA_VERSION"

                # Check if the Lambda function version with commit ID exists
                if [[ "$LAMBDA_VERSION" == "" ]]; then
                  # Update Lambda environment variables
                  ENV_FILE="${LAMBDA_NAME}-env.json"
                  if [[ -f "$ENV_FILE" ]]; then
                    aws lambda update-function-configuration \
                      --function-name $LAMBDA_NAME \
                      --environment "file://$ENV_FILE" \
                      > /dev/null
                    echo "Update environment variables"
                  fi

                  # Check Lambda status
                  while true; do
                    sleep 5
                    UPDATE_STATUS=$(aws lambda get-function-configuration \
                      --function-name $LAMBDA_NAME \
                      --query 'State' \
                      --output text)
                    if [ "$UPDATE_STATUS" == "Active" ]; then
                      echo "Lambda update completed. Proceeding with deployment."
                      break
                    elif [ "$UPDATE_STATUS" == "Pending" ]; then
                      echo "Lambda update in progress. Waiting..."
                      sleep 5
                    else
                      echo "Unexpected state: $UPDATE_STATUS"
                      exit 1
                    fi
                  done

                  # Update Lambda function code
                  aws lambda update-function-code \
                    --function-name $LAMBDA_NAME \
                    --zip-file fileb://$LAMBDA_NAME.zip \
                    > /dev/null
                  echo "Update function code"

                  # Check Lambda status
                  while true; do
                    sleep 5
                    UPDATE_STATUS=$(aws lambda get-function-configuration \
                      --function-name $LAMBDA_NAME \
                      --query 'State' \
                      --output text)
                    if [ "$UPDATE_STATUS" == "Active" ]; then
                      echo "Lambda update completed. Proceeding with deployment."
                      break
                    elif [ "$UPDATE_STATUS" == "Pending" ]; then
                      echo "Lambda update in progress. Waiting..."
                      sleep 5
                    else
                      echo "Unexpected state: $UPDATE_STATUS"
                      exit 1
                    fi
                  done

                  # Create new version
                  LAMBDA_VERSION=$(aws lambda publish-version \
                    --function-name $LAMBDA_NAME \
                    --description "${COMMIT_ID}" \
                    --query Version \
                    --output text)
                  echo "Deployed Lambda version: $LAMBDA_VERSION"
                fi

                # Update Alias
                aws lambda update-alias \
                  --function-name $LAMBDA_NAME \
                  --name prod \
                  --function-version $LAMBDA_VERSION \
                  > /dev/null
                echo "Alias 'prod' updated to version $LAMBDA_VERSION"
              fi
            fi
          done
