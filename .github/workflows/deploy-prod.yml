        uses: actions/setup-python@v4
        with:
          python-version: 3.9  # 필요한 Python 버전

      # 3. 종속성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. flake8 실행
      - name: Run flake8
        run: flake8 .

